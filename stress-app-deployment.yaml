---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-app
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  selector:
    matchLabels:
      app: memory-app
  template:
    metadata:
      labels:
        app: memory-app
    spec:
      containers:
      - name: stress-app
        image: ubuntu:latest
        imagePullPolicy: IfNotPresent
        command: ["/bin/bash", "/app/script.sh"]
        resources:
          requests:
            cpu: "100m"
            memory: "50Mi"
          limits:
            cpu: "200m"
            memory: "100Mi"
        volumes:
        - name: memory-boomb-script
          configMap:
            name: stress-app-memory-boomb-config
        volumeMounts:
        - name: memory-boomb-script
          mountPath: /app/script.sh
          defaultMode: 755
